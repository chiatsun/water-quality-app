<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>水質日常紀錄</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0f19">
    <!-- Icons (Material Symbols) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="style.css?v=1.2">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1>水質紀錄</h1>
                <p>每日測量資料同步</p>
            </div>
            <a href="https://docs.google.com/spreadsheets/d/1S5BwHs2wRPfWwgPlUZ_lgKLCLtA9dndqune02ei80pc/edit" target="_blank" class="icon-link" title="開啟總表紀錄">
                <div class="icon-container">
                    <span class="material-symbols-outlined">water_drop</span>
                </div>
            </a>
        </header>

        <!-- Main Form -->
        <main class="form-container">
            
            <!-- Action Buttons for Smart Input -->
            <div class="action-buttons">
                <button type="button" id="voiceBtn" class="action-btn voice-btn">
                    <span class="material-symbols-outlined">mic</span>
                    <span>語音填寫</span>
                </button>
                <button type="button" id="ocrBtn" class="action-btn ocr-btn">
                    <span class="material-symbols-outlined">photo_camera</span>
                    <span>拍照 (OCR)</span>
                </button>
                <!-- Hidden file input for OCR -->
                <input type="file" accept="image/*" capture="environment" id="ocrInput" style="display:none;">
            </div>

            <form id="waterQualityForm">
                
                <!-- Date -->
                <div class="input-group">
                    <label for="dateField">
                        <span class="material-symbols-outlined icon">calendar_month</span> 日期 (Date)
                    </label>
                    <input type="date" id="dateField" name="date" required>
                </div>

                <!-- Area -->
                <div class="input-group">
                    <div class="label-header">
                        <label>
                            <span class="material-symbols-outlined icon">location_on</span> 測量區域
                        </label>
                        <!-- 動態分區連結移至此處 -->
                        <div id="zoneLinkContainer" class="zone-link-container hide">
                            <a href="#" target="_blank" id="zoneSheetLink" class="zone-sheet-btn">
                                <span class="material-symbols-outlined">table_chart</span>
                                <span id="targetAreaName"></span> 歷史紀錄
                            </a>
                        </div>
                    </div>
                    <div class="segment-group">
                        <label class="segment">
                            <input type="radio" name="area" value="生理區" required>
                            <span>生理區</span>
                        </label>
                        <label class="segment">
                            <input type="radio" name="area" value="魚病區" required>
                            <span>魚病區</span>
                        </label>
                        <label class="segment">
                            <input type="radio" name="area" value="基轉區" required>
                            <span>基轉區</span>
                        </label>
                    </div>
                </div>

                <!-- Temperature -->
                <div class="input-group">
                    <label for="tempField">
                        <span class="material-symbols-outlined icon">thermostat</span> 溫度 (℃)
                    </label>
                    <input type="number" id="tempField" name="temperature" step="0.01" inputmode="decimal" placeholder="例如: 25.40" required>
                </div>

                <!-- pH -->
                <div class="input-group">
                    <label for="phField">
                        <span class="material-symbols-outlined icon">science</span> pH 值
                    </label>
                    <input type="number" id="phField" name="ph" step="0.01" inputmode="decimal" placeholder="例如: 7.20" required>
                </div>



                <!-- Salinity (PSU) -->
                <div class="input-group">
                    <label for="salinityField">
                        <span class="material-symbols-outlined icon">grain</span> 鹽度 (PSU)
                    </label>
                    <input type="number" id="salinityField" name="salinity" step="0.01" inputmode="decimal" placeholder="例如: 32.50" required>
                </div>

                <!-- ORP (mV) -->
                <div class="input-group">
                    <label for="orpField">
                        <span class="material-symbols-outlined icon">electric_bolt</span> 氧化還原 (ORP) mV
                    </label>
                    <input type="number" id="orpField" name="orp" step="0.1" inputmode="decimal" placeholder="例如: 250.0" required>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submitBtn" class="submit-btn">
                    <span class="btn-text">送出紀錄</span>
                    <span class="material-symbols-outlined btn-icon">send</span>
                    <!-- Loading Spinner -->
                    <div class="spinner hide"></div>
                </button>
            </form>
        </main>

        <!-- Notification Toast -->
        <div id="toast" class="toast">
            <span class="material-symbols-outlined toast-icon">check_circle</span>
            <span class="toast-message">紀錄成功！</span>
        </div>

        <!-- Voice Text Fallback Modal -->
        <div id="voiceModal" class="modal-overlay">
            <div class="modal-card">
                <div class="modal-header">
                    <span class="material-symbols-outlined modal-icon">edit_note</span>
                    <h3>快速文字輸入</h3>
                </div>

                <!-- 上方兩欄說明 -->
                <div class="modal-hints-row">
                    <span>點標籤後輸入數值，可任意順序</span>
                    <span>💡 點標籤後直接輸入數值</span>
                </div>

                <!-- 標籤按鈕 -->
                <div class="quick-tags">
                    <button type="button" class="quick-tag-btn" data-label="溫度">
                        <span class="material-symbols-outlined">thermostat</span>溫度
                    </button>
                    <button type="button" class="quick-tag-btn" data-label="pH">
                        <span class="material-symbols-outlined">science</span>pH
                    </button>
                    <button type="button" class="quick-tag-btn" data-label="鹽度">
                        <span class="material-symbols-outlined">grain</span>鹽度
                    </button>
                    <button type="button" class="quick-tag-btn" data-label="ORP">
                        <span class="material-symbols-outlined">electric_bolt</span>ORP
                    </button>
                </div>

                <!-- 新增：快速數字按鈕 (解決 Gboard 語音衝突) -->
                <div class="quick-numbers">
                    <button type="button" class="num-btn">1</button>
                    <button type="button" class="num-btn">2</button>
                    <button type="button" class="num-btn">3</button>
                    <button type="button" class="num-btn">4</button>
                    <button type="button" class="num-btn">5</button>
                    <button type="button" class="num-btn">6</button>
                    <button type="button" class="num-btn">7</button>
                    <button type="button" class="num-btn">8</button>
                    <button type="button" class="num-btn">9</button>
                    <button type="button" class="num-btn">.</button>
                    <button type="button" class="num-btn">0</button>
                    <button type="button" class="num-btn backspace-btn">
                        <span class="material-symbols-outlined">backspace</span>
                    </button>
                </div>

                <!-- 單一文字輸入框 (改回 text 以啟用語音麥克風) -->
                <input type="text" id="voiceTextInput"
                    placeholder="點上方按鈕後輸入數值">

                <!-- 底部說明（兩行） -->
                <div class="input-hint">
                    <div class="hint-row">
                        <span>不點標籤直接填數值時，順序為</span>
                        <span class="hint-order">① 溫度 ② pH ③ 鹽度 ④ ORP</span>
                    </div>
                    <div>數值間可用 <strong>空白</strong> 或 <strong>，</strong>，區隔，支援負數</div>
                </div>

                <div class="modal-actions">
                    <button id="voiceModalCancel" type="button" class="modal-btn cancel-btn">取消</button>
                    <button id="voiceModalSubmit" type="button" class="modal-btn submit-modal-btn">
                        <span class="material-symbols-outlined">check</span> 填入表單
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
